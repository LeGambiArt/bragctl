baseURL = 'http://0.0.0.0:1313'
title = "%%TITLE%%"
theme = 'hugo-book'
author = "%%AUTHOR%%"
description = "Personal brag document and work journal tracking weekly accomplishments, demos, presentations, and professional content creation."

disablePathToLower = true
enableGitInfo = true

[markup]
[markup.goldmark.renderer]
  unsafe = true

[markup.tableOfContents]
  startLevel = 0

[menu]
[[menu.home]]
  name = "Years"
  url = "years"
  weight = 1

[params]
  BookLogo = '/images/logo.svg'
  BookTheme = 'dark'
  BookSection = '/'
  BookLastChangeLink = '{{ .Site.Params.BookRepo }}/commit/{{ .GitInfo.Hash }}'
  BookEditLink = '{{ .Site.Params.BookRepo }}/edit/main/exampleSite/{{ .Path }}'
  BookDateFormat = 'January 2, 2006'
  BookSearch = true
  BookComments = true
  BookPortableLinks = true
  BookServiceWorker = true
  BookTranslatedOnly = false
